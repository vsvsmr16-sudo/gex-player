name: Build Gex Player APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Setup
        run: |
          mkdir -p assets/images
          python3 -c "
          import struct,zlib
          def mk(w,h):
            def ch(t,d):
              c=t+d
              return struct.pack('>I',len(d))+c+struct.pack('>I',zlib.crc32(c)&0xffffffff)
            raw=b''.join(b'\x00'+b'\x0d\x0d\x18'*w for _ in range(h))
            return b'\x89PNG\r\n\x1a\n'+ch(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+ch(b'IDAT',zlib.compress(raw))+ch(b'IEND',b'')
          open('assets/images/logo.png','wb').write(mk(512,512))
          open('assets/images/logo_fg.png','wb').write(mk(512,512))
          "
          FSDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FSDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Overwrite settings.gradle
        run: |
          FSDK=$(dirname $(dirname $(which flutter)))
          cat > android/settings.gradle << EOF
          pluginManagement {
              def flutterSdkPath = "${FSDK}"
              includeBuild("\${flutterSdkPath}/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.1.0" apply false
              id "org.jetbrains.kotlin.android" version "1.9.0" apply false
          }
          include ":app"
          EOF

      - name: Overwrite gradle files
        run: |
          cat > android/build.gradle << 'EOF'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = "../build"
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
              project.evaluationDependsOn(":app")
          }
          tasks.register("clean", Delete) { delete rootProject.buildDir }
          EOF

          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "org.jetbrains.kotlin.android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.gexplayer.app"
              compileSdk 34
              ndkVersion "25.1.8937393"
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
              defaultConfig {
                  applicationId "com.gexplayer.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          flutter { source "../.." }
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GexPlayer-v1.0.0
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
